<div class="inline-drawer" id="scenekit_container">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>SceneKit</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
    </div>
    <div class="inline-drawer-content">

        <div class="scenekit-master-row">
            <label class="scenekit-toggle-label" for="scenekit_enabled">
                <input type="checkbox" id="scenekit_enabled" />
                <span class="scenekit-toggle-text">Enable SceneKit</span>
            </label>
        </div>

        <div id="scenekit_settings_body">

            <details class="scenekit-section">
                <summary>General</summary>
                <div class="scenekit-section-content">
                    <label class="scenekit-checkbox-row" for="scenekit_debug">
                        <input type="checkbox" id="scenekit_debug" />
                        Debug mode
                    </label>
                </div>
            </details>

            <details class="scenekit-section">
                <summary>Scene Behavior</summary>
                <div class="scenekit-section-content">
                    <span class="scenekit-placeholder">No settings yet.</span>
                </div>
            </details>

        </div>
    </div>
</div>
